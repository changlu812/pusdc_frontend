<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AviaryPay Withdraw | Secure Privacy Protocol</title>
    <link rel="icon" href="/static/logos/icon.svg" type="image/svg+xml" />
    <meta name="description" content="Securely withdraw your USDC from the Base Mainnet Privacy Protocol." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common/base.css" />
    <link rel="stylesheet" href="/static/css/common/wallet_ux.css" />
    <link rel="stylesheet" href="/static/css/pages/base_withdraw.css" />
</head>

<body>
    <nav>
        <a href="/" class="logo"><img src="/static/logos/logo_white.svg" alt="AviaryPay" style="height: 52px" /></a>
        <button id="navActionBtn" class="btn-launch" style="border: none; cursor: pointer">
            Connect Wallet
        </button>
    </nav>

    <div class="container">
        <div class="card">
            <div class="nav-links" style="
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
          ">
                <a href="/zentra/deposit" style="
              color: var(--text-dim);
              text-decoration: none;
              font-weight: 600;
            ">Deposit</a>
                <a href="/zentra/transfer" style="
              color: var(--text-dim);
              text-decoration: none;
              font-weight: 600;
            ">Transfer</a>
                <a href="/zentra/withdraw" style="
              color: var(--primary);
              text-decoration: none;
              font-weight: 600;
              border-bottom: 2px solid var(--primary);
            ">Withdraw</a>
            </div>
            <div class="header">
                <h1>PUSDC Withdraw</h1>
                <p>Withdraw USDC from Privacy Protocol</p>
            </div>

            <div id="app">
                <button id="connectBtn" class="btn btn-primary">
                    Connect Wallet
                </button>

                <div id="bridgeUI" style="display: none">
                    <div class="input-group">
                        <div class="label-row">
                            <span>Wallet Balance</span>
                            <span class="balance" id="usdcBalance">0.00</span>
                        </div>
                        <div class="label-row" style="margin-bottom: 12px">
                            <span>Hidden Balance</span>
                            <span class="balance" id="privacyBalance" style="color: var(--primary)">0.00</span>
                        </div>
                        <div class="input-wrapper">
                            <input type="number" id="amount" placeholder="0.0" step="0.000001" />
                            <div class="token-tag">PUSDC</div>
                        </div>
                    </div>

                    <button id="actionBtn" class="btn btn-primary">
                        Withdraw USDC
                    </button>
                </div>

                <div id="status"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/pages/zentra_withdraw.js"></script>
</body>

</html>
